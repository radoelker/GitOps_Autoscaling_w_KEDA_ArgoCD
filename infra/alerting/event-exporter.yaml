apiVersion: v1
kind: ServiceAccount
metadata:
  name: event-exporter
  namespace: logiflow
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::686699774218:role/LogiFlowWorkerRole-rd"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: event-exporter
rules:
  - apiGroups: [""]
    resources: ["events", "namespaces", "nodes", "pods", "services", "replicationcontrollers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: event-exporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: event-exporter
subjects:
  - kind: ServiceAccount
    name: event-exporter
    namespace: logiflow
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: event-exporter-config
  namespace: logiflow
data:
  config.yaml: |
    logLevel: info
    logFormat: json
    route:
      routes:
        - match:
            - receiver: "sns-alerts"
              reason: "SuccessfulRescale|FailedScale|ScalingReplicaSet"
              namespace: "logiflow"
    receivers:
      - name: "sns-alerts"
        webhook:
          endpoint: "http://sns-notifier.logiflow.svc.cluster.local:8080/notify"
          headers:
            Content-Type: "application/json"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-exporter
  namespace: logiflow
  labels:
    app: event-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-exporter
  template:
    metadata:
      labels:
        app: event-exporter
    spec:
      serviceAccountName: event-exporter
      containers:
        - name: event-exporter
          image: ghcr.io/resmoio/kubernetes-event-exporter:latest
          args:
            - -conf=/data/config.yaml
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
            - name: config
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: event-exporter-config
